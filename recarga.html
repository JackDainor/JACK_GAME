        function createGameCard(game) {
            const card = document.createElement('div');
            card.className = `game-card bg-zinc-900 border border-zinc-700 rounded-3xl overflow-hidden`;
            
            card.innerHTML = `
                <div class="h-60 bg-cover bg-center relative" style="background-image: url('${game.image}')">
                    <div class="absolute inset-0 bg-gradient-to-t from-zinc-900/90 to-transparent"></div>
                    <div class="absolute bottom-4 left-4">
                        <span class="px-4 py-1 bg-black/80 text-sm font-semibold rounded-2xl">${game.name}</span>
                    </div>
                </div>
                <div class="p-7">
                    <p class="text-zinc-300 mb-8">${game.description}</p>
                    <button onclick="irARecarga('${game.file}')" 
                            class="w-full py-4 bg-gradient-to-r from-orange-500 to-red-600 font-bold text-lg rounded-2xl hover:scale-105 transition-all flex items-center justify-center gap-2">
                        <i class="fa-solid fa-bolt"></i>
                        RECARGAR ${game.name}
                    </button>
                </div>
            `;
            return card;
        }

        function renderGames() {
            const container = document.getElementById('games-grid');
            container.innerHTML = '';
            games.forEach(game => {
                container.appendChild(createGameCard(game));
            });
        }

        function irARecarga(fileName) {
            window.location.href = fileName;
        }

        window.onload = renderGames;
    </script>
    
    <!-- === CUADRO "NO ENCUENTRAS TU JUEGO" === -->
<div class="max-w-5xl mx-auto px-6 py-16 text-center">

        <button onclick="abrirModalSolicitud()" 
                class="px-10 py-4 bg-gradient-to-r from-orange-500 to-red-600 hover:from-orange-600 hover:to-red-700 font-bold text-xl rounded-2xl transition-all">
            Solicitar Juego
        </button>
    </div>

<!-- === MODAL / VENTANA EMERGENTE === -->
<div id="modalSolicitud" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[1000]">
    <div class="bg-zinc-900 border border-zinc-700 rounded-3xl max-w-md w-full mx-4 p-8">
        <h2 class="text-2xl font-bold text-center mb-6">¿Qué juego quieres?</h2>
        
        <input type="text" id="nombreJuego" 
               class="w-full bg-zinc-800 border border-zinc-600 rounded-2xl px-5 py-4 text-lg focus:outline-none focus:border-orange-500 mb-6"
               placeholder="Ej: Call of Duty Mobile, Brawl Stars, etc.">
        
        <div class="flex gap-4">
            <button onclick="cerrarModal()" 
                    class="flex-1 py-4 border border-zinc-600 font-semibold rounded-2xl hover:bg-zinc-800">
                Cancelar
            </button>
            <button onclick="enviarSolicitudJuego()" 
                    class="flex-1 py-4 bg-gradient-to-r from-green-500 to-emerald-600 font-bold rounded-2xl">
                Solicitar Juego
            </button>
        </div>
    </div>
</div>

<script>
    function abrirModalSolicitud() {
        document.getElementById('modalSolicitud').classList.remove('hidden');
        document.getElementById('nombreJuego').focus();
    }

    function cerrarModal() {
        document.getElementById('modalSolicitud').classList.add('hidden');
    }

    function enviarSolicitudJuego() {
        const juego = document.getElementById('nombreJuego').value.trim();
        
        if (!juego) {
            alert("Por favor escribe el nombre del juego");
            return;
        }

        const mensaje = encodeURIComponent(
            `🟡 *Solicitud de Nuevo Juego*\n\n` +
            `🎮 Juego solicitado: ${juego}\n\n` +
            `Por favor agrégalo al catálogo.`
        );

        window.open(`https://wa.me/59163614354?text=${mensaje}`, '_blank');
        
        // Cerrar modal y limpiar campo
        cerrarModal();
        document.getElementById('nombreJuego').value = '';
        
        // Mensaje de confirmación
        setTimeout(() => {
            alert("✅ Solicitud enviada correctamente. Te avisaré cuando esté disponible.");
        }, 800);
    }

    // Cerrar modal al presionar Escape
    document.addEventListener('keydown', function(e) {
        if (e.key === "Escape") {
            cerrarModal();
        }
    });
</script>
